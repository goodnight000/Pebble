scrape_thresholds:
  pre_fetch_full: 40
  pre_fetch_full_priority: 70

urgent:
  min_global_score: 85
  max_age_hours: 6
  min_sources: 2

clustering:
  attach_similarity: 0.86
  lookback_days: 7
  novelty_lookback_days: 90

weights:
  global:
    entity_prominence: 0.15
    event_impact: 0.15
    authority: 0.12
    corroboration: 0.12
    social_velocity: 0.10
    cluster_velocity: 0.08
    novelty: 0.08
    event_rarity: 0.07
    funding: 0.05
    research_rigor: 0.05
    source_diversity: 0.03
  modifiers:
    official_boost: 1.10
    confirmed_impact_boost: 1.12
    big_money_boost: 1.08

EVENT_HALFLIFE_HOURS: 18

trust:
  weights:
    source_authority: 0.20
    corroboration: 0.30
    official_confirmation: 0.25
    claim_quality: 0.15
    primary_document: 0.10
  labels:
    official_min_score: 80
    confirmed_min_score: 65
    confirmed_min_sources: 3
    likely_min_score: 55
    likely_min_sources: 2
    developing_max_age_hours: 6
    unverified_max_score: 40
  content_type_floors:
    RESEARCH_PAPER_with_doc: 65
    OPEN_SOURCE_RELEASE_with_doc: 70
  echo_detection:
    text_similarity_threshold: 0.60
    developing_penalty: 0.90

keywords:
  releases: 0.20
  launches: 0.20
  introduces: 0.20
  announces: 0.20
  open-source: 0.20
  open source: 0.20
  raises: 0.20
  series a: 0.20
  series b: 0.20
  funding: 0.20
  acquires: 0.20
  acquisition: 0.20
  merger: 0.20
  security: 0.20
  vulnerability: 0.20
  leak: 0.20
  arxiv: 0.20
  paper: 0.15
  benchmark: 0.15
  sota: 0.15
  gpu: 0.15
  hbm: 0.15
  inference chip: 0.15
  training chip: 0.15
  CVE: 0.25
  zero-day: 0.25
  zero day: 0.25
  ransomware: 0.20
  malware: 0.20
  exploit: 0.20
  data breach: 0.25
  threat actor: 0.20
  APT: 0.20
