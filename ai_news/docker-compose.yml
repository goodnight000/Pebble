services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_news
      POSTGRES_USER: ai_news
      POSTGRES_PASSWORD: ai_news
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: ["sh", "-lc", "alembic upgrade head && python -m app.scripts.seed_sources && uvicorn app.api.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: ["sh", "-lc", "sleep 5 && celery -A app.tasks.celery_app worker --loglevel=INFO"]
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: ["sh", "-lc", "sleep 5 && celery -A app.tasks.celery_app beat --loglevel=INFO"]
    depends_on:
      - db
      - redis

volumes:
  db_data:
